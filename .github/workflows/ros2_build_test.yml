name: ROS 2 Jazzy Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Task 4: Easy to extend package list. 
  # Add waybionic_rviz_plugins or waybionic_sensors here when they merge.
  PACKAGES: "waybionic_description waybionic_bringup"

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Dynamically create the folder based on the repository's actual name
          path: src/${{ github.event.repository.name }}

      - name: Install Dependencies (rosdep)
        run: |
          apt-get update
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build Packages
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --packages-select ${{ env.PACKAGES }}

      - name: Run Tests
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon test --packages-select ${{ env.PACKAGES }}
          colcon test-result --all
