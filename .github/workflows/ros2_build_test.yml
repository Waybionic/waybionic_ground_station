name: ROS 2 Jazzy Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: src/${{ github.event.repository.name }}

      - name: Install Dependencies (rosdep)
        run: |
          apt-get update
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build Packages
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build

      - name: Run Tests
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon test
          colcon test-result --all
